            React.createElement('select', { className:"form-input form-select", value:varForm.bedId, onChange:e=>setVarForm(f=>({...f, bedId:e.target.value})) },
              React.createElement('option', { value:"" }, "Select bed..."),
              userData.beds.map(b => React.createElement('option', { key:b.id, value:b.id }, b.name))
            )
          ),
          React.createElement('div', { className:"form-group" },
            React.createElement('label', { className:"form-label" }, "Colour / Description"),
            React.createElement('input', { className:"form-input", placeholder:"e.g. Cream apricot", value:varForm.colour, onChange:e=>setVarForm(f=>({...f, colour:e.target.value})) })
          ),
          React.createElement('div', { className:"form-group" },
            React.createElement('div', { style:{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10} },
            React.createElement('div', null,
              React.createElement('label', { className:"form-label" }, "Sown Date"),
              React.createElement('input', { className:"form-input", type:"date", value:varForm.sownDate, onChange:e=>setVarForm(f=>({...f, sownDate:e.target.value})) })
            ),
            React.createElement('div', null,
              React.createElement('label', { className:"form-label" }, "Planted Out"),
              React.createElement('input', { className:"form-input", type:"date", value:varForm.plantedDate, onChange:e=>setVarForm(f=>({...f, plantedDate:e.target.value})) })
            )
          ),
          React.createElement('label', { className:"form-label" }, "Notes"),
            React.createElement('input', { className:"form-input", placeholder:"e.g. Sown March 2026", value:varForm.notes, onChange:e=>setVarForm(f=>({...f, notes:e.target.value})) })
          ),
          React.createElement('div', { style:{display:"flex", gap:10} },
            React.createElement('button', { className:"btn btn-secondary", onClick:()=>setModal(null) }, "Cancel"),
            React.createElement('button', { className:"btn btn-primary", onClick:handleAddVariety, disabled:!varForm.name||!varForm.bedId||syncing }, syncing ? "Saving..." : "Add Variety")
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
