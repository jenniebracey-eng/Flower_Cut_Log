// ---------- App ----------
function App() {

    const header = lines[0].split(',').map(s => s.trim().replace(/^"+|"+$/g,'').toLowerCase());
    const bedNameIdx = header.findIndex(h => h === 'bed name');
    const varNameIdx = header.findIndex(h => h === 'variety name');
    const sownIdx    = header.findIndex(h => h === 'sown date');
    const plantedIdx = header.findIndex(h => h === 'planted date');
    if (bedNameIdx === -1) { showToast('CSV missing Bed Name column'); return; }
    setSyncing(true);
    let bedsCreated = 0, varsCreated = 0, bedsSkipped = 0, errors = 0;
    const existingBedNames = new Set((userData.beds || []).map(b => b.name.toLowerCase()));
    const localBedMap = {};
    (userData.beds || []).forEach(b => { localBedMap[b.name.toLowerCase()] = b.id; });
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(s => s.trim().replace(/^"+|"+$/g,''));
      const bedName = cols[bedNameIdx] || '';
      const varName = varNameIdx !== -1 ? (cols[varNameIdx] || '') : '';
      const sownDate = sownIdx !== -1 ? (cols[sownIdx] || '') : '';
      const plantedDate = plantedIdx !== -1 ? (cols[plantedIdx] || '') : '';
      if (!bedName) continue;
      const bedKey = bedName.toLowerCase();
      if (!localBedMap[bedKey]) {
        if (existingBedNames.has(bedKey)) { bedsSkipped++; }
        else {
          const { data: newBed, error: bedErr } = await sb.from('beds').insert({ user_id: session.user.id, name: bedName }).select().single();
          if (bedErr) { errors++; continue; }
          localBedMap[bedKey] = newBed.id;
          existingBedNames.add(bedKey);
          bedsCreated++;
        }
      }
      const bedId = localBedMap[bedKey];
      if (varName && bedId) {
        const { error: varErr } = await sb.from('varieties').insert({
          user_id: session.user.id, bed_id: bedId, name: varName,
          sown_date: sownDate || null, planted_date: plantedDate || null

        if (varErr) errors++;
        else varsCreated++;
      }
    }
